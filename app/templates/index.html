{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>儀表板</h2>
    <form method="GET" action="{{ url_for('main.index') }}" class="d-flex gap-2">
        <input type="month" name="month" class="form-control" value="{{ month or '' }}">
        <button type="submit" class="btn btn-outline-primary">篩選</button>
        {% if month %}
        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">清除</a>
        {% endif %}
    </form>
</div>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card bg-success text-white mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-graph-up-arrow"></i> 總收入</h5>
                <h2 class="mb-0">${{ total_income | round(0) | int }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-danger text-white mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-graph-down-arrow"></i> 總支出</h5>
                <h2 class="mb-0">${{ total_expense | round(0) | int }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-primary text-white mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-piggy-bank"></i> 結餘</h5>
                <h2 class="mb-0">${{ balance | round(0) | int }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-center gap-3 mt-4">
    <a href="{{ url_for('records.add_form') }}" class="btn btn-primary btn-lg px-4"><i class="bi bi-plus-circle"></i> 新增記錄</a>
    <a href="{{ url_for('reports.report') }}" class="btn btn-outline-primary btn-lg px-4"><i class="bi bi-pie-chart"></i> 查看報表</a>
</div>
{% endblock %}
